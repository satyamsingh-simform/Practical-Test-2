<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrumble-Game</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <h1>Word Scramble Quiz</h1>
    <main>
      <section class="game-board">
        <div class="game-constraint">
          <p class="timer">Total time:00</p>
          <p class="life">Total life:❤️❤️❤️</p>
          <!-- <p class="difficulty-level">difficulty-level</p> -->
          <select name="" id="" class="difficulty-level">
            <option value="easy" selected>easy</option>
            <option value="medium">medium</option>
            <option value="hard">hard</option>
          </select>

          <select name="" id="" class="catogery">
            <option value="fruitData" selected>fruit</option>
            <option value="movieData">movies</option>
            <option value="cricketerData">cricket</option>
          </select>
        </div>
        
        <section class="game-leader-board">
          <div class="score-div">
            <span>score:</span>
            <span class="score">0</span>
          </div>
          <div class="hint">
            <span>hint</span>
          </div>
        </section>

        <div class="scrumble">
          <div class="guess-word">
            <input class="fill-word" id="fill-word" type="text" placeholder="guess...">
            <!-- <button class="getWord">ans</button> -->
          </div>
          <div>
            <div class="word-appear">ordw</div>
            <!-- <button class="next-word">next</button> -->
          </div>
          <button class="reset">reset</button>
   
        </div>
      </section>

    </main>
    <section class="user-data">
      <div class="best-score">
        <p>Best score</p>
        <p class="score">0</p>
      </div>
    </section>
    
  
<script type="module" src="./src/main.ts"></script>
</body>
</html>
