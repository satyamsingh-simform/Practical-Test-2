<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrumble-Game</title>
  <link rel="stylesheet" href="./src/style.css">
  <script defer src="./src/main.ts"></script>
</head>
<body>
    <h1>Word Scramble Quiz</h1>
    <main>
      <section class="game-board">
        <div class="game-constraint">
          <p class="timer">timer</p>
          <p class="life">Total life:3</p>
          <!-- <p class="difficulty-level">difficulty-level</p> -->
          <select name="" id="" class="difficulty-level">
            <option value="">level</option>
            <option value="easy">easy</option>
            <option value="medium">medium</option>
            <option value="hard">hard</option>
          </select>

          <select name="" id="" class="catogery">
            <option value="">category</option>
            <option value="fruitData">fruit</option>
            <option value="movieData">movies</option>
            <option value="cricketerData">cricket</option>
          </select>
        </div>
        
        <section class="game-leader-board">
          <div class="score-div">
            <span>score:</span>
            <span class="score">0</span>
          </div>
          <div class="hint">
            <span>hint</span>
          </div>
        </section>

        <div class="scrumble">
          <div class="guess-word">
            <input class="fill-word" type="text" placeholder="guess word">
            <button class="getWord">ans</button>
          </div>
          <div class="word-appear">ordw</div>
        </div>
          <button class="next-word">next</button>
          <button class="reset">reset</button>
      </section>
      <section class="user-data">
        <div class="user-game-data">

        </div>
    </section>
      
    </main>
    
  

</body>
</html>
